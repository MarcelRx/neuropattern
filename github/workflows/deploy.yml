name: CI/CD to Azure Container Apps

on:
  push:
    branches:
      - main

env:
  ACR_NAME: neuropatternregistry
  CONTAINER_APP_NAME: neuropattern-api
  RESOURCE_GROUP: neuropattern-rg

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Login to Azure using the Service Principal Secret
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 2. Login to your Azure Container Registry
      - name: Login to ACR
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # 3. Build the Docker Image and tag it with the Commit SHA
      - name: Build and Push Docker Image
        run: |
          IMAGE_TAG=${{ secrets.ACR_LOGIN_SERVER }}/neuropattern-api:${{ github.sha }}
          docker build -t $IMAGE_TAG .
          docker tag $IMAGE_TAG ${{ secrets.ACR_LOGIN_SERVER }}/neuropattern-api:latest
          docker push $IMAGE_TAG
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/neuropattern-api:latest

      # 4. Deploy the new image to the Container App
      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          acrName: ${{ env.ACR_NAME }}
          containerAppName: ${{ env.CONTAINER_APP_NAME }}
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          imageToDeploy: ${{ secrets.ACR_LOGIN_SERVER }}/neuropattern-api:${{ github.sha }}