name: Build and Push to Azure

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/neuropattern-api:${{ github.sha }} .
          docker tag ${{ secrets.ACR_LOGIN_SERVER }}/neuropattern-api:${{ github.sha }} ${{ secrets.ACR_LOGIN_SERVER }}/neuropattern-api:latest

      - name: Push Docker image
        run: |
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/neuropattern-api:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/neuropattern-api:latest