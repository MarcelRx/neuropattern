name: Build and Deploy to Azure

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Login to Azure Container Registry
      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # 3. Build Docker image
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/neuropattern-api:${{ github.sha }} .
          docker tag ${{ secrets.ACR_LOGIN_SERVER }}/neuropattern-api:${{ github.sha }} ${{ secrets.ACR_LOGIN_SERVER }}/neuropattern-api:latest

      # 4. Push to ACR
      - name: Push Docker image
        run: |
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/neuropattern-api:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/neuropattern-api:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      # 5. Deploy to Azure Web App (Container)
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ secrets.ACR_LOGIN_SERVER }}/neuropattern-api:${{ github.sha }}